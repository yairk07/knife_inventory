services:
  - type: web
    name: blade-steel
    repo: https://github.com/yairk07/knife_inventory
    branch: main
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers 1 --bind 0.0.0.0:$PORT app:app
    healthCheckPath: /health
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: TRUST_PROXY
        value: "1"
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: REMEMBER_COOKIE_SECURE
        value: "1"
      - key: SECRET_KEY
        generateValue: true

{% extends "base.html" %}

{% block content %}
<div class="container" style="max-width: 400px; margin: 60px auto 0 auto;">
    <div class="card" style="padding: 40px;">
        <h2 style="text-align: center; margin-bottom: 25px; color: var(--primary);">{{ tr('login_title') }}</h2>
        
        <form method="POST" action="{{ url_for('login') }}">
            <input type="hidden" name="next" value="{{ request.args.get('next') or '' }}">
            
            <div style="margin-bottom: 20px;">
                <label style="display: block; font-weight: 500; font-size: 0.9rem; margin-bottom: 8px;">{{ tr('email') }}</label>
                <input type="email" name="email" required style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 6px; background: #111620; color: #fff;">
            </div>
            
            <div style="margin-bottom: 12px;">
                <label style="display: block; font-weight: 500; font-size: 0.9rem; margin-bottom: 8px;">{{ tr('password') }}</label>
                <input type="password" name="password" id="loginPassword" required autocomplete="current-password" style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 6px; background: #111620; color: #fff;">
            </div>
            <div style="margin-bottom: 25px; display: flex; align-items: center; gap: 8px;">
                <input type="checkbox" id="loginShowPassword" style="width: 16px; height: 16px; accent-color: var(--primary);">
                <label for="loginShowPassword" style="font-size: 0.9rem; color: var(--text-muted); cursor: pointer;">{{ tr('show_password') }}</label>
            </div>
            
            <div style="margin-bottom: 25px; display: flex; align-items: center; gap: 8px;">
                <input type="checkbox" name="remember" id="remember" style="width: 16px; height: 16px; background: #111620; border: 1px solid var(--border); border-radius: 4px; accent-color: var(--primary);">
                <label for="remember" style="font-size: 0.9rem; color: var(--text-muted); cursor: pointer;">{{ tr('remember_me') }}</label>
            </div>
            
            <button type="submit" class="auth-btn auth-btn-primary">{{ tr('sign_in') }}</button>
        </form>

        <div style="margin: 25px 0; display: flex; align-items: center; color: var(--text-muted);">
            <hr style="flex: 1; border: none; border-top: 1px solid var(--border);">
            <span style="padding: 0 15px; font-size: 0.85rem;">{{ tr('or_divider') }}</span>
            <hr style="flex: 1; border: none; border-top: 1px solid var(--border);">
        </div>

        <a href="{{ url_for('login_google') }}" class="auth-btn auth-btn-google">
            <svg class="auth-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            {{ tr('google_sign_in') }}
        </a>

        <p style="text-align: center; margin-top: 25px; font-size: 0.9rem; color: var(--text-muted);">
            {{ tr('login_no_account') }} <a href="{{ url_for('register') }}" style="color: var(--primary); text-decoration: none;">{{ tr('login_register_link') }}</a>
        </p>
    </div>
</div>
{% endblock %}
{% block extra_scripts %}
<script>attachPasswordToggle("loginShowPassword", "loginPassword");</script>
{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Knife</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111827;
            color: #f3f4f6;
            margin: 0;
            padding: 24px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        .card {
            background: #1f2937;
            border: 1px solid #374151;
            border-radius: 16px;
            padding: 20px;
        }

        input, select, textarea, button, a {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #4b5563;
            background: #111827;
            color: #f9fafb;
            box-sizing: border-box;
            margin-bottom: 12px;
            text-decoration: none;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        button {
            background: #2563eb;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .back {
            display: inline-block;
            text-align: center;
            background: #374151;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>Edit Knife</h1>

            <form method="POST">
                <input type="text" name="brand" value="{{ knife['brand'] }}" required>
                <input type="text" name="model" value="{{ knife['model'] }}" required>

                <select name="status" required>
                    <option value="home" {% if knife["status"]= ="home" %}selected{% endif %}>Home</option>
                    <option value="cart" {% if knife["status"]= ="cart" %}selected{% endif %}>Cart</option>
                    <option value="on_the_way" {% if knife["status"]= ="on_the_way" %}selected{% endif %}>On the way</option>
                </select>

                <input type="number" step="0.01" name="price" value="{{ knife['price'] }}" required>
                <input type="number" name="quantity" value="{{ knife['quantity'] }}" min="1" required>
                <textarea name="notes">{{ knife["notes"] }}</textarea>

                <button type="submit">Save Changes</button>
            </form>

            <a class="back" href="/">Back</a>
        </div>
    </div>
</body>
</html>
